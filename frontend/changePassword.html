<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Hospital Management</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        p { color: #666; font-size: 14px; text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .btn:hover { background: #0056b3; }
        .alert { padding: 12px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; display: none; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Set New Password</h2>
        <p>This is your first login. Please set a secure password to continue to your dashboard.</p>
        
        <div id="message" class="alert"></div>

        <form id="changePasswordForm">
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" required minlength="6" placeholder="Enter new password">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" required minlength="6" placeholder="Confirm new password">
            </div>
            <button type="submit" class="btn">Update Password</button>
        </form>
    </div>

    <script>
        const API_BASE = window.location.port === '5000' ? window.location.origin : 'http://localhost:5000';

        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            // Use the same parseJwt function as in auth.js
            const payload = JSON.parse(atob(token.split('.')[1]));
            const firstLogin = localStorage.getItem('firstLogin') === 'true' || Boolean(payload.firstLogin);
            if (payload.role !== 'doctor' || !firstLogin) {
                window.location.href = payload.role === 'doctor' ? 'doctor.html' : 'index.html';
            }
        });

        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');

            if (newPassword !== confirmPassword) {
                messageDiv.textContent = "Passwords do not match";
                messageDiv.className = "alert alert-error";
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/auth/change-password-first-login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ newPassword })
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.textContent = "Password updated! Redirecting to login...";
                    messageDiv.className = "alert alert-success";
                    
                    setTimeout(() => {
                        localStorage.removeItem('token');
                        localStorage.removeItem('role');
                        localStorage.removeItem('firstLogin');
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    messageDiv.textContent = data.error || data.message || "Failed to update password";
                    messageDiv.className = "alert alert-error";
                }
            } catch (err) {
                messageDiv.textContent = "An error occurred. Please try again.";
                messageDiv.className = "alert alert-error";
            }
        });
    </script>
</body>
</html>
