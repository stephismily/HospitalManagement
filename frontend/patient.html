<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Patient Dashboard</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-brand">Hospital Appointment API</div>
      <div class="nav-actions">
        <span id="welcomeUser" class="welcome-text"></span>
        <button id="themeToggle" class="theme-toggle-btn" title="Toggle Theme">
          🌓
        </button>
        <button id="logoutBtn" class="btn-primary" style="padding: 0.5rem 1rem">
          Logout
        </button>
      </div>
    </nav>

    <main class="container">
      <div id="patientMessage"></div>

      <div class="dashboard-grid">
        <!-- Profile Section -->
        <section class="card">
          <h3 class="section-header">Patient Profile</h3>
          <div id="profile" class="text-dim">Loading profile...</div>
          <button class="btn-primary mt-4" id="resetBtn" style="width: 100%">
            Refresh Dashboard
          </button>
        </section>

        <!-- Search Section -->
        <section class="card">
          <h3 class="section-header">Find Doctors</h3>
          <form id="slotSearchForm">
            <div class="mt-4">
              <input
                type="text"
                class="form-control"
                id="doctorName"
                placeholder="Search by name..."
              />
            </div>
            <div class="mt-4">
              <input
                type="text"
                class="form-control"
                id="specialization"
                placeholder="Specialization (e.g. Cardiology)"
              />
            </div>
            <div class="mt-4">
              <input type="date" class="form-control" id="slotDate" />
            </div>
            <div style="display: flex; gap: 1rem" class="mt-4">
              <button type="submit" class="btn-primary" style="flex: 2">
                Search
              </button>
              <button
                type="button"
                class="btn-primary"
                id="clearSearchBtn"
                style="flex: 1; background: var(--text-dim)"
              >
                Clear
              </button>
            </div>
          </form>
        </section>
      </div>

      <div class="mt-4">
        <h3 class="section-header">Available Appointment Slots</h3>
        <div id="slotsList" class="dashboard-grid">Loading...</div>
      </div>

      <div class="mt-4">
        <h3 class="section-header">My Appointments</h3>
        <div id="appointmentsList" class="dashboard-grid">Loading...</div>
      </div>
    </main>

    <script src="js/patient.js"></script>
  </body>
</html>
