<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="card-title">Doctor Dashboard</h2>
        <p class="text-muted">Manage your profile, available slots, and appointments.</p>

        <div id="doctorMessage" class="mb-3"></div>

        <div class="d-flex gap-2 mb-4">
          <button class="btn btn-primary" id="resetBtn">Reset</button>
          <button class="btn btn-secondary" id="logoutBtn">Logout</button>
        </div>

        <section class="mb-4">
          <h5 class="mb-3">Profile</h5>
          <div id="profile" class="border rounded p-3 bg-white">Loading profile...</div>
        </section>

        <section class="mb-4">
          <h5 class="mb-3">Add Free Slot</h5>
          <form id="slotForm" class="row g-3 border rounded p-3 bg-white">
            <div class="col-md-4">
              <label class="form-label" for="slotDate">Date</label>
              <input type="date" class="form-control" id="slotDate" required>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="slotStartTime">Start Time</label>
              <input type="time" class="form-control" id="slotStartTime" required>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="slotEndTime">End Time</label>
              <input type="time" class="form-control" id="slotEndTime" required>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-success">Add Slot</button>
            </div>
          </form>
        </section>

        <section class="mb-4">
          <h5 class="mb-3">My Slots</h5>
          <div id="slotsList" class="row g-3">Loading slots...</div>
        </section>

        <section>
          <h5 class="mb-3">My Appointments</h5>
          <div id="appointmentsList" class="row g-3">Loading appointments...</div>
        </section>
      </div>
    </div>
  </div>
  <script src="js/doctor.js"></script>
</body>
</html>
