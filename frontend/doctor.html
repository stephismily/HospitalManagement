<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctor Dashboard - Hospital Appointment API</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-brand">Hospital Appointment API</div>
      <div class="nav-actions">
        <span id="welcomeUser" class="welcome-text"></span>
        <button id="themeToggle" class="theme-toggle-btn" title="Toggle Theme">
          🌓
        </button>
        <button id="logoutBtn" class="btn-primary" style="padding: 0.5rem 1rem">
          Logout
        </button>
      </div>
    </nav>

    <main class="container">
      <div id="doctorMessage"></div>

      <div class="dashboard-grid">
        <!-- Profile Section -->
        <section class="card">
          <h3 class="section-header">Doctor Profile</h3>
          <div id="profile" class="text-dim">Loading profile...</div>
          <button class="btn-primary mt-4" id="resetBtn" style="width: 100%">
            Refresh Dashboard
          </button>
        </section>

        <!-- Add Slot Section -->
        <section class="card">
          <h3 class="section-header">Add Availability</h3>
          <form id="slotForm">
            <div class="mt-4">
              <label>Date</label>
              <input type="date" class="form-control" id="slotDate" required />
            </div>
            <div style="display: flex; gap: 1rem" class="mt-4">
              <div style="flex: 1">
                <label>Start Time</label>
                <input
                  type="time"
                  class="form-control"
                  id="slotStartTime"
                  required
                />
              </div>
              <div style="flex: 1">
                <label>End Time</label>
                <input
                  type="time"
                  class="form-control"
                  id="slotEndTime"
                  required
                />
              </div>
            </div>
            <button type="submit" class="btn-primary mt-4" style="width: 100%">
              Create Slot
            </button>
          </form>
        </section>
      </div>

      <div class="mt-4">
        <h3 class="section-header">Active Time Blocks</h3>
        <div id="slotsList" class="dashboard-grid">Loading slots...</div>
      </div>

      <div class="mt-4">
        <h3 class="section-header">Pending Appointments</h3>
        <div id="appointmentsList" class="dashboard-grid">
          Loading appointments...
        </div>
      </div>
    </main>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal-overlay">
      <div class="card modal-card" style="max-width: 400px; width: 90%">
        <h3 class="section-header">Confirm Deletion</h3>
        <p class="text-dim">
          Are you sure you want to remove this availability slot? This action
          cannot be undone.
        </p>
        <div
          style="display: flex; gap: 1rem; justify-content: flex-end"
          class="mt-4"
        >
          <button
            id="cancelDeleteBtn"
            class="btn-primary"
            style="background: var(--text-dim)"
          >
            Cancel
          </button>
          <button
            id="confirmDeleteBtn"
            class="btn-primary"
            style="background: var(--danger)"
          >
            Delete Slot
          </button>
        </div>
      </div>
    </div>

    <script src="js/doctor.js"></script>
  </body>
</html>
