<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hospital Appointment API</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-brand">Hospital Appointment API</div>
      <div class="nav-actions">
        <button id="themeToggle" class="theme-toggle-btn" title="Toggle Theme">
          🌓
        </button>
      </div>
    </nav>

    <main class="container">
      <div id="authMessage"></div>

      <!-- Login Section -->
      <section
        id="loginSection"
        class="card"
        style="max-width: 400px; margin: 4rem auto"
      >
        <h2 class="section-header">Sign In</h2>
        <form id="loginForm">
          <div class="mt-4">
            <label>Email Address</label>
            <input type="email" id="email" class="form-control" required />
          </div>
          <div class="mt-4">
            <label>Password</label>
            <input
              type="password"
              id="password"
              class="form-control"
              required
            />
          </div>
          <button type="submit" class="btn-primary mt-4" style="width: 100%">
            Login
          </button>
        </form>
        <p class="mt-4 text-center">
          New user? <a href="#" id="showRegister">Create account</a>
        </p>
      </section>

      <!-- Register Section (Hidden by default) -->
      <section
        id="registerSection"
        class="card d-none"
        style="max-width: 500px; margin: 4rem auto"
      >
        <h2 class="section-header">Register</h2>
        <form id="registerForm">
          <div class="mt-4">
            <input
              type="text"
              id="patientName"
              class="form-control"
              placeholder="Full Name"
              required
            />
          </div>
          <div class="mt-4">
            <input
              type="email"
              id="registerEmail"
              class="form-control"
              placeholder="Email"
              required
            />
          </div>
          <div class="mt-4">
            <input
              type="password"
              id="registerPassword"
              class="form-control"
              placeholder="Password"
              required
            />
          </div>
          <div class="mt-4">
            <input
              type="text"
              id="contact"
              class="form-control"
              placeholder="Contact Number"
              required
            />
          </div>
          <div class="mt-4">
            <label>DOB</label
            ><input type="date" id="dob" class="form-control" required />
          </div>
          <div class="mt-4">
            <textarea
              id="address"
              class="form-control"
              placeholder="Address"
            ></textarea>
          </div>
          <button type="submit" class="btn-primary mt-4" style="width: 100%">
            Sign Up
          </button>
        </form>
        <p class="mt-4 text-center">
          Already have an account? <a href="#" id="showLogin">Sign In</a>
        </p>
      </section>
    </main>

    <script src="js/auth.js"></script>
  </body>
</html>
